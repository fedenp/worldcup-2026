name: Sync Data & Deploy

on:
  schedule:
    - cron: '0 */4 * * *'   # cada 4 horas (00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC)
  workflow_dispatch:         # permite ejecutarlo manualmente desde Actions

permissions:
  contents: write   # para poder hacer git commit + push
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch matches from BSD API
        run: node scripts/fetch-matches.js
        env:
          BSD_API_TOKEN: ${{ secrets.BSD_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Fetch standings from BSD API
        run: node scripts/fetch-standings.js
        env:
          BSD_API_TOKEN: ${{ secrets.BSD_API_TOKEN }}

      - name: Fetch pre-partido data (predictions + venues)
        run: node scripts/fetch-predictions.js
        env:
          BSD_API_TOKEN: ${{ secrets.BSD_API_TOKEN }}

      - name: Fetch odds from the-odds-api.com
        run: node scripts/fetch-odds.js
        continue-on-error: true   # don't fail the workflow if odds are unavailable
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Fetch manager data for all 48 teams
        run: node scripts/fetch-managers.js
        continue-on-error: true   # don't fail the workflow if endpoint is slow
        env:
          BSD_API_TOKEN: ${{ secrets.BSD_API_TOKEN }}

      - name: Fetch player stats for all finished matches
        run: node scripts/fetch-player-stats.js
        continue-on-error: true
        env:
          BSD_API_TOKEN: ${{ secrets.BSD_API_TOKEN }}

      - name: Fetch squad rosters (26 players per team)
        run: node scripts/fetch-squads.js
        continue-on-error: true
        env:
          BSD_API_TOKEN: ${{ secrets.BSD_API_TOKEN }}

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/matches.json public/data/standings.json public/data/match/ public/data/odds.json public/data/managers.json public/data/player-stats.json public/data/squads.json
          git diff --cached --quiet || git commit -m "chore: sync matches + standings + predictions + odds + managers + player-stats + squads [skip ci]"
          git push

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
